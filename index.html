<style>
:root{

  --brand:#1F6E5C; --brand-ink:#FFFFFF;
  --koku:#D64545; --su:#3B7DD8; --ei:#2F9E63; --ri:#E8842C; --sha:#8E5BC0; --fuku:#7A8494; --eiken:#B8912A; --sou:#5B8A8F; --juku:#1F3A68;
  --ok:#2F9E63; --late:#D64545; --ahead:#3B7DD8;
  --offbg:#E3EEF9; --testbg:#FBE9E9; --obonbg:#FBF2E0;
  --shadow:0 1px 3px rgba(30,30,40,.08);
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#15171C; --card:#1F2229; --card2:#242832; --ink:#E8E6E1; --ink2:#9A9DA6; --line:#33363F;
    --brand:#2E8B75; --offbg:#1D2733; --testbg:#33211F; --obonbg:#2E2820; --shadow:none; }
}
:root[data-theme="light"]{ --bg:#F5F3EC; --card:#FFFFFF; --card2:#FAF9F4; --ink:#26282E; --ink2:#6B6E76; --line:#E2DFD5;
  --brand:#1F6E5C; --offbg:#E3EEF9; --testbg:#FBE9E9; --obonbg:#FBF2E0; --shadow:0 1px 3px rgba(30,30,40,.08); }
:root[data-theme="dark"]{ --bg:#15171C; --card:#1F2229; --card2:#242832; --ink:#E8E6E1; --ink2:#9A9DA6; --line:#33363F;
  --brand:#2E8B75; --offbg:#1D2733; --testbg:#33211F; --obonbg:#2E2820; --shadow:none; }

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; background:var(--bg); color:var(--ink); font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:15px; line-height:1.5;}
.app{max-width:560px; margin:0 auto; padding:0 12px calc(76px + env(safe-area-inset-bottom));}

/* ── ヘッダ ── */
.top{position:sticky; top:0; z-index:20; background:var(--bg); padding:10px 0 8px;}
.topcard{background:linear-gradient(120deg,var(--brand),#2F9E63); color:#fff; border-radius:16px; padding:14px 16px;}
.topcard .date{font-size:20px; font-weight:800; font-variant-numeric:tabular-nums;}
.topcard .sub{font-size:12px; opacity:.9; margin-top:2px;}
.topbadges{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
.bdg{font-size:11px; font-weight:700; border-radius:999px; padding:2px 10px; background:rgba(255,255,255,.22); color:#fff;}
.bdg.hot{background:#fff; color:var(--brand);}

/* ── セクション/カード ── */
h2.sec{font-size:13px; color:var(--ink2); letter-spacing:.06em; margin:18px 4px 8px; font-weight:700;}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); margin-bottom:10px;}
.empty{color:var(--ink2); font-size:13px; padding:14px 16px; text-align:center;}

/* ── タスク行 ── */
.trow{display:flex; align-items:center; gap:10px; padding:11px 12px; min-height:48px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; -webkit-user-select:none; position:relative;}
.trow:last-child{border-bottom:none;}
.trow .stripe{position:absolute; left:0; top:0; bottom:0; width:4px;}
.cbx{flex:none; width:24px; height:24px; border:2px solid var(--ink2); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; background:transparent; transition:transform .12s;}
.trow.done .cbx{background:var(--ok); border-color:var(--ok);}
.trow.done .txt{color:var(--ink2); text-decoration:line-through; text-decoration-thickness:1.5px;}
.trow:active .cbx{transform:scale(1.15);}
.tbody{flex:1; min-width:0;}
.txt{font-size:14px;}
.meta{display:flex; gap:5px; align-items:center; margin-top:2px; flex-wrap:wrap;}
.subj{flex:none; font-size:10.5px; font-weight:800; color:#fff; border-radius:5px; padding:1px 6px;}
.ktag{font-size:10px; font-weight:800; color:#fff; border-radius:4px; padding:1px 5px;}
.k-h{background:#2F9E63}.k-j{background:#1F3A68}.k-t{background:#D64545}
.pill{font-size:10.5px; font-weight:700; border-radius:999px; padding:1px 8px;}
.pill.late{background:var(--late); color:#fff;}
.pill.saki{background:var(--ahead); color:#fff;}
.pill.donedate{background:var(--card2); color:var(--ink2); border:1px solid var(--line);}
.s-koku{background:var(--koku)}.s-su{background:var(--su)}.s-ei{background:var(--ei)}.s-ri{background:var(--ri)}
.s-sha{background:var(--sha)}.s-fuku{background:var(--fuku)}.s-eiken{background:var(--eiken)}.s-sou{background:var(--sou)}

/* 遅れカード */
.card.alert{border-color:var(--late);}
.card.alert .head{background:var(--late); color:#fff; font-size:12.5px; font-weight:800; padding:6px 12px;}

/* オフ */
.offbox{background:var(--offbg); border-radius:14px; padding:26px 16px; text-align:center; font-size:15px; font-weight:700; color:#3E6C99; margin-bottom:10px;}
.offbox small{display:block; font-weight:400; font-size:12px; margin-top:6px; color:var(--ink2);}

/* 先取り */
.sakidori .trow{background:var(--card2);}
.more{display:block; width:100%; border:none; background:none; color:var(--brand); font-weight:700; font-size:13px; padding:11px; cursor:pointer;}

/* ── 全体タブ(日付×教科グリッド) ── */
.week{margin-bottom:10px;}
.whead{display:flex; align-items:center; gap:8px; width:100%; border:none; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; font-size:14.5px; font-weight:800; color:var(--ink); cursor:pointer;}
.whead .ph{margin-left:auto; font-size:10.5px; color:#fff; border-radius:999px; padding:2px 9px; font-weight:700;}
.ph1{background:#2F9E63}.ph2{background:#3B7DD8}.ph3{background:#8E5BC0}.ph4{background:#D64545}
.gwrap{overflow-x:auto; margin-top:8px; border:1px solid var(--line); border-radius:12px; background:var(--card); -webkit-overflow-scrolling:touch;}
table.gtable{border-collapse:separate; border-spacing:0; min-width:900px; width:100%;}
.gtable th{position:sticky; top:0; z-index:2; font-size:11px; color:#fff; padding:6px 4px; text-align:center; border-bottom:1px solid var(--line);}
.gtable th.gd{position:sticky; left:0; z-index:3; background:#4A4A55; min-width:64px;}
.gtable td{border-bottom:1px solid var(--line); border-right:1px solid var(--line); vertical-align:top; padding:3px; min-width:100px; font-size:10.5px; background:var(--card);}
.gtable td.gdate{position:sticky; left:0; z-index:1; background:var(--card2); min-width:64px; font-weight:800; font-variant-numeric:tabular-nums; font-size:12.5px; padding:5px 6px;}
.gdate small{font-weight:700; color:var(--ink2); font-size:10px;}
.gdate small.sat{color:var(--su)} .gdate small.sun{color:var(--koku)}
.gdate .ebd{display:inline-block; font-size:8.5px; font-weight:700; color:#fff; background:var(--juku); border-radius:999px; padding:1px 6px; margin-top:3px;}
.gdate .ebd.ev{background:#E8842C}.gdate .ebd.ts{background:#D64545}.gdate .ebd.of{background:#3B7DD8}
tr.off td{background:var(--offbg)} tr.off td.gdate{background:var(--offbg)}
tr.test td{background:var(--testbg)} tr.test td.gdate{background:var(--testbg)}
tr.obon td{background:var(--obonbg)} tr.obon td.gdate{background:var(--obonbg)}
td.gband{vertical-align:middle; text-align:left; font-size:12px; font-weight:700; color:#4A6B8A; padding:10px;}
tr.test td.gband{color:#B03A3A;}
.chip{display:flex; gap:4px; align-items:flex-start; border-radius:7px; padding:4px 5px; margin:2px 0; background:var(--card2); border:1px solid var(--line); cursor:pointer; line-height:1.3; user-select:none; -webkit-user-select:none;}
.chip .st{flex:none; font-weight:800;}
.chip.cdone{color:var(--ink2); background:transparent; border-style:dashed;}
.chip.cdone .ct{text-decoration:line-through;}
.chip.cdone .st{color:var(--ok);}
.chip.clate{border-color:var(--late);}
.chip.clate .st{color:var(--late);}
.ghint{font-size:11px; color:var(--ink2); margin:2px 4px 8px;}

/* ── 進捗タブ ── */
.stats{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;}
.stat{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px;}
.stat .big{font-size:24px; font-weight:800; font-variant-numeric:tabular-nums;}
.stat .lbl{font-size:11px; color:var(--ink2);}
.pbar-row{padding:10px 14px; border-bottom:1px solid var(--line);}
.pbar-row:last-child{border-bottom:none;}
.pbar-top{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:700;}
.pbar-top .num{margin-left:auto; font-size:12px; color:var(--ink2); font-variant-numeric:tabular-nums;}
.pace{font-size:10.5px; font-weight:700; border-radius:999px; padding:1px 8px; color:#fff;}
.pace.ahead{background:var(--ahead)} .pace.late{background:var(--late)} .pace.on{background:var(--fuku)}
.pbar{height:8px; border-radius:999px; background:var(--card2); border:1px solid var(--line); margin-top:6px; overflow:hidden;}
.pbar>div{height:100%; border-radius:999px;}
.logday{padding:10px 14px; border-bottom:1px solid var(--line); font-size:13px;}
.logday:last-child{border-bottom:none;}
.logday b{font-variant-numeric:tabular-nums;}
.logday ul{margin:4px 0 0; padding-left:18px; color:var(--ink2); font-size:12.5px;}
.btnrow{display:flex; gap:8px; flex-wrap:wrap; padding:12px 14px;}
button.act{border:1px solid var(--line); background:var(--card2); color:var(--ink); border-radius:10px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer;}
button.act.danger{color:var(--late); border-color:var(--late);}
textarea.io{width:100%; height:110px; border:1px solid var(--line); border-radius:10px; background:var(--card2); color:var(--ink); font-size:11px; padding:8px; margin:0 0 8px;}

/* ── タブバー ── */
.tabbar{position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--card); border-top:1px solid var(--line); display:flex; padding-bottom:env(safe-area-inset-bottom);}
.tabbar button{flex:1; border:none; background:none; padding:9px 0 7px; font-size:11px; font-weight:700; color:var(--ink2); cursor:pointer; font-family:inherit;}
.tabbar button .ic{display:block; font-size:20px; line-height:1.2;}
.tabbar button.on{color:var(--brand);}
.warnbar{background:#B8912A; color:#fff; font-size:12px; padding:7px 12px; border-radius:10px; margin:8px 0;}
.toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); font-size:13px; font-weight:700; border-radius:999px; padding:8px 18px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:40; white-space:nowrap;}
.toast.show{opacity:.94;}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
button:focus-visible,.trow:focus-visible,.whead:focus-visible{outline:2px solid var(--brand); outline-offset:2px;}
</style>

</head>

/* 今日(?date=YYYY-MM-DD で上書き可) */
function todayMD(){
  var m=location.search.match(/[?&]date=(\d{4})-(\d{2})-(\d{2})/);
  var dt = m? new Date(+m[1],+m[2]-1,+m[3]) : new Date();
  if(dt.getFullYear()<Y || (dt.getFullYear()===Y && md(dt)<'0718')) return '0718';
  if(dt.getFullYear()>Y || md(dt)>'0911') return '0911';
  return md(dt);
}
var TODAY=todayMD();
function fmt(mdd){ return (+mdd.slice(0,2))+'/'+(+mdd.slice(2)); }
function daysBetween(a,b){ var da=new Date(Y,+a.slice(0,2)-1,+a.slice(2)), db=new Date(Y,+b.slice(0,2)-1,+b.slice(2)); return Math.round((db-da)/86400000); }

/* ============ 操作 ============ */
function toggle(id){
  var t=BYID[id]; if(!t) return;
  if(state.done[id]){ delete state.done[id]; toast('チェックを取り消しました'); }
  else{
    state.done[id]=TODAY;
    var q=nextInQueue(t.subj);
    if(t.type==='q' && t.date>TODAY){ toast('先取り!✨ 次: '+(q&&q.date>TODAY?short(q.text):'なし')); }
    else toast('よくできました!✅');
  }
  lsSet(state); render();
}
function short(s){ return s.length>14? s.slice(0,14)+'…' : s; }
function nextInQueue(subj){
  var list=TASKS.filter(function(t){return t.subj===subj&&t.type==='q'&&!state.done[t.id];});
  list.sort(function(a,b){return a.date<b.date?-1:1;});
  return list[0]||null;
}
var toastTimer=null;
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.classList.remove('show');},1600); }

/* ============ 描画部品 ============ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function rowHTML(t, opts){
  opts=opts||{};
  var done=!!state.done[t.id];
  var pills='';
  if(done) pills+='<span class="pill donedate">済 '+fmt(state.done[t.id])+'</span>';
  else if(opts.late>0) pills+='<span class="pill late">'+opts.late+'日遅れ</span>';

  var tag=t.tag? '<span class="ktag '+TAG[t.tag][1]+'">'+TAG[t.tag][0]+'</span>':'';
  var s=SUBJ[t.subj];
  return '<div class="trow'+(done?' done':'')+'" role="button" tabindex="0" data-id="'+t.id+'">'
    +'<span class="stripe '+s[1]+'"></span>'
    +'<span class="cbx">'+(done?'✓':'')+'</span>'
    +'<div class="tbody"><div class="txt">'+esc(t.text)+'</div>'
    +'<div class="meta"><span class="subj '+s[1]+'">'+s[0]+'</span>'+tag+pills+'</div></div></div>';
}
function bindRows(root){
  var rows=root.querySelectorAll('.trow[data-id],.chip[data-id]');
  for(var i=0;i<rows.length;i++){
    (function(el){
      el.addEventListener('click',function(){toggle(el.getAttribute('data-id'));});
      el.addEventListener('keydown',function(e){ if(e.key===' '||e.key==='Enter'){e.preventDefault();toggle(el.getAttribute('data-id'));} });
    })(rows[i]);
  }
}

/* ============ 今日タブ ============ */
var sakiOpen=1;
function renderToday(){
  var mdd=TODAY, html='';
  var isOff=!!OFF[mdd];
  /* 遅れfixed */
  var lateFixed=TASKS.filter(function(t){return t.type==='f'&&t.date<mdd&&!state.done[t.id];});
  if(lateFixed.length){
    html+='<div class="card alert"><div class="head">⚠️ 期限が過ぎています(早めに片づけよう)</div>';
    lateFixed.forEach(function(t){ html+=rowHTML(t,{late:daysBetween(t.date,mdd)}); });
    html+='</div>';
  }
  if(isOff){
    html+='<div class="offbox">🏖️ 今日は完全オフ!<small>よく遊び、よく休もう。やる気があれば下の先取りもOK</small></div>';
  }else{
    /* ノルマ: queue(date<=today 未完了) + daily(today) + fixed(today) */
    var norm=TASKS.filter(function(t){
      if(state.done[t.id]) return false;
      if(t.type==='q') return t.date<=mdd;
      return t.date===mdd;
    });
    norm.sort(function(a,b){ return a.date<b.date?-1: a.date>b.date?1:0; });
    html+='<h2 class="sec">📋 今日のノルマ('+norm.length+'件)</h2><div class="card">';
    if(norm.length===0) html+='<div class="empty">ぜんぶ完了! 下から先取りしよう🚀</div>';
    norm.forEach(function(t){ var late=(t.type==='q'&&t.date<mdd)?daysBetween(t.date,mdd):0; html+=rowHTML(t,{late:late}); });
    html+='</div>';
  }
  /* 先取り */
  var sakiHTML='', count=0;
  QUEUE_SUBJECTS.forEach(function(s){
    var list=TASKS.filter(function(t){return t.subj===s&&t.type==='q'&&!state.done[t.id]&&t.date>mdd;});
    list.sort(function(a,b){return a.date<b.date?-1:1;});
    for(var i=0;i<Math.min(sakiOpen,list.length);i++){ sakiHTML+=rowHTML(list[i],{saki:true}); count++; }
  });
  if(count){
    html+='<h2 class="sec">🚀 先取りOK(チェックすると次が出てくる)</h2><div class="card sakidori">'+sakiHTML
      +'<button class="more" id="morebtn">'+(sakiOpen===1?'もっと先取りする ▼':'表示を減らす ▲')+'</button></div>';
  }
  /* 今日やったこと */
  var doneToday=TASKS.filter(function(t){return state.done[t.id]===mdd;});
  if(doneToday.length){
    html+='<h2 class="sec">✅ 今日やったこと('+doneToday.length+'件・タップで取り消し)</h2><div class="card">';
    doneToday.forEach(function(t){ html+=rowHTML(t); });
    html+='</div>';
  }
  return html;
}

        if(EVENTS[mdd]) bd+='<span class="ebd '+EVENTS[mdd][1]+'">'+EVENTS[mdd][0]+'</span>';
        if(OFF[mdd]) bd+='<span class="ebd of">オフ</span>';
        var dateCell='<td class="gdate"'+(DAYNOTE[mdd]?' title="'+esc(DAYNOTE[mdd])+'"':'')+'>'+fmt(mdd)+'<small class="'+(dow===0?'sun':dow===6?'sat':'')+'">('+DOWJ[dow]+')</small>'+(bd?'<br>'+bd:'')+'</td>';
        html+='<tr'+cls+'>'+dateCell;
        if(OFF[mdd]){
          html+='<td class="gband" colspan="'+GRID_SUBJ.length+'">🏖️ 完全オフ! よく遊びよく休もう</td></tr>';
          return;
        }
        GRID_SUBJ.forEach(function(s){
          var list=TASKS.filter(function(t){return t.date===mdd&&t.subj===s;});
          html+='<td>';
          list.forEach(function(t){ html+=chipHTML(t); });
          html+='</td>';
        });
        html+='</tr>';
      });
      html+='</table></div>';
    }
    html+='</div>';
  });
  return html;
}

/* ============ 進捗タブ ============ */
function pace(subj){
  var next=nextInQueue(subj);
  if(!next) return null;
  if(next.date<TODAY) return -daysBetween(next.date,TODAY);
  /* 今日のぶんが未完なら「ペース通り」扱い、全部済んでいれば先行 */
  var todayLeft=TASKS.some(function(t){return t.subj===subj&&t.type==='q'&&t.date<=TODAY&&!state.done[t.id];});
  if(todayLeft) return 0;
  return daysBetween(TODAY,next.date);
}
function streak(){
  var s=0, dt=new Date(Y,+TODAY.slice(0,2)-1,+TODAY.slice(2));
  for(;;){
    var mdd=md(dt);
    if(mdd<'0718') break;
    var didAny=TASKS.some(function(t){return state.done[t.id]===mdd;});
    if(OFF[mdd]&&!didAny){ dt.setDate(dt.getDate()-1); continue; }
    if(didAny){ s++; dt.setDate(dt.getDate()-1); }
    else{ if(mdd===TODAY){ dt.setDate(dt.getDate()-1); continue; } break; }
  }
  return s;
}
function renderStats(){
  var total=0, done=0;
  TASKS.forEach(function(t){ if(t.type!=='d'){ total++; if(state.done[t.id]) done++; } });
  var doneAll=Object.keys(state.done).length;
  var html='<div class="stats">'
    +'<div class="stat"><div class="big">'+streak()+'日🔥</div><div class="lbl">連続学習ストリーク</div></div>'
    +'<div class="stat"><div class="big">'+done+'<span style="font-size:14px;color:var(--ink2)">/'+total+'</span></div><div class="lbl">課題タスク完了(毎日型を除く)</div></div>'
    +'</div>';
  html+='<h2 class="sec">📚 教科別の進捗とペース</h2><div class="card">';
  QUEUE_SUBJECTS.concat(['sou']).forEach(function(s){
    var list=TASKS.filter(function(t){return t.subj===s&&t.type!=='d';});
    if(!list.length) return;
    var dn=list.filter(function(t){return state.done[t.id];}).length;
    var pct=Math.round(dn/list.length*100);
    var p=pace(s), ptag='';
    if(p===null) ptag = dn===list.length ? '<span class="pace ahead">全部完了🎉</span>' : '';
    else if(p>0) ptag='<span class="pace ahead">'+p+'日先行</span>';
    else if(p<0) ptag='<span class="pace late">'+(-p)+'日遅れ</span>';
    else ptag='<span class="pace on">ペース通り</span>';
    var sj=SUBJ[s];
    html+='<div class="pbar-row"><div class="pbar-top"><span class="subj '+sj[1]+'">'+sj[0]+'</span>'+ptag
      +'<span class="num">'+dn+'/'+list.length+'('+pct+'%)</span></div>'
      +'<div class="pbar"><div class="'+sj[1]+'" style="width:'+pct+'%"></div></div></div>';
  });
  html+='</div>';
  /* 英検 */
  var eikDone=TASKS.filter(function(t){return t.subj==='eiken'&&state.done[t.id];}).length;
  var eikPast=TASKS.filter(function(t){return t.subj==='eiken'&&t.date<=TODAY;}).length;
  html+='<div class="card"><div class="pbar-row"><div class="pbar-top"><span class="subj s-eiken">英検</span>'
    +'<span class="num">ここまで '+eikDone+'/'+eikPast+'日 実施</span></div>'
    +'<div class="pbar"><div class="s-eiken" style="width:'+(eikPast?Math.round(eikDone/eikPast*100):0)+'%"></div></div></div></div>';
  /* ログ */
  var byDate={};
  TASKS.forEach(function(t){ var dd=state.done[t.id]; if(dd){ (byDate[dd]=byDate[dd]||[]).push(t); } });
  var dates=Object.keys(byDate).sort().reverse();
  html+='<h2 class="sec">📖 日別の完了ログ</h2><div class="card">';
  if(!dates.length) html+='<div class="empty">まだ記録がありません。今日タブでチェックしよう!</div>';
  dates.slice(0,14).forEach(function(dd){
    html+='<div class="logday"><b>'+fmt(dd)+'('+DOWJ[dowOf(dd)]+')</b> — '+byDate[dd].length+'件<ul>';
    byDate[dd].forEach(function(t){ html+='<li>'+esc(t.text)+'</li>'; });
    html+='</ul></div>';
  });
  html+='</div>';
  /* バックアップ */
  html+='<h2 class="sec">💾 バックアップ</h2><div class="card"><div class="btnrow" style="flex-direction:column; align-items:stretch">'
    +'<textarea class="io" id="io" placeholder="「書き出す」でここにデータが出ます。別端末では貼り付けて「読み込む」"></textarea>'
    +'<div style="display:flex; gap:8px; flex-wrap:wrap">'
    +'<button class="act" id="exp">書き出す</button>'
    +'<button class="act" id="imp">読み込む</button>'
    +'<button class="act danger" id="rst">リセット</button></div></div></div>';
  return html;
}

/* ============ ルート描画 ============ */
var TAB='today';
(function(){ var m=location.search.match(/[?&]tab=(today|all|stats)/); if(m) TAB=m[1]; })();
function go(t){ TAB=t; render(); window.scrollTo(0,0); }
function render(){
  /* ヘッダ */
  var mdd=TODAY, dow=dowOf(mdd);
  var badges='';
  if(JUKU[mdd]) badges+='<span class="bdg hot">'+JUKU[mdd]+'</span>';
  if(EVENTS[mdd]) badges+='<span class="bdg hot">'+EVENTS[mdd][0]+'</span>';
  if(OFF[mdd]) badges+='<span class="bdg">🏖️オフ</span>';
  var doneToday=TASKS.filter(function(t){return state.done[t.id]===mdd;}).length;
  badges+='<span class="bdg">今日 '+doneToday+'件 完了</span>';
  var remainTest=daysBetween(mdd,'0909');
  if(remainTest>0) badges+='<span class="bdg">夏テストまで'+remainTest+'日</span>';
  document.getElementById('topcard').innerHTML=
    '<div class="date">'+fmt(mdd)+'('+DOWJ[dow]+')</div>'
    +'<div class="sub">夏休み学習 2026 ｜ 宿題→塾模試→夏テスト→英検準2級</div>'
    +'<div class="topbadges">'+badges+'</div>';
  document.getElementById('warn').innerHTML = storeOK? '' : '<div class="warnbar">⚠️ この環境では進捗が保存されません。SafariかChromeでURLを直接開いてください。</div>';
  var v=document.getElementById('view');
  v.innerHTML = TAB==='today'? renderToday() : TAB==='all'? renderAll() : renderStats();
  bindRows(v);
  ['today','all','stats'].forEach(function(t){ document.getElementById('tab-'+t).className = (t===TAB?'on':''); });
  /* 追加バインド */
  var mb=document.getElementById('morebtn');
  if(mb) mb.addEventListener('click',function(){ sakiOpen = sakiOpen===1?3:1; render(); });
  var wh=v.querySelectorAll('.whead');
  for(var i=0;i<wh.length;i++){ (function(el){ el.addEventListener('click',function(){ var k=el.getAttribute('data-w'); openWeeks[k]=!openWeeks[k]; render(); }); })(wh[i]); }
  var exp=document.getElementById('exp');
  if(exp){
    exp.addEventListener('click',function(){ document.getElementById('io').value=JSON.stringify(state); toast('書き出しました。全選択してコピー!'); });
    document.getElementById('imp').addEventListener('click',function(){
      try{ var st=JSON.parse(document.getElementById('io').value); if(st&&st.done){ state=st; lsSet(state); render(); toast('読み込みました✅'); } else toast('データ形式がちがいます'); }
      catch(e){ toast('読み込めませんでした'); }
    });
    document.getElementById('rst').addEventListener('click',function(){
      if(confirm('進捗をぜんぶ消します。いいですか?') && confirm('本当に消しますか?(元に戻せません)')){ state={done:{}}; lsSet(state); render(); toast('リセットしました'); }
    });
  }
}
render();
</script>
